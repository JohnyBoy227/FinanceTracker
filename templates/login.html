<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}" />
</head>
<body>
    <div class="wrapper">
        <form id="login-form" action="{{url_for('login')}}" method="POST">
            <h1>Login</h1>
            <p id="error-message"></p>
            <div class="input-box">
                <label for="email">
                    <span>@</span>
                </label>
                <input type="email" name="email-input" id="email-input" placeholder="Email" required>
            </div>
            <div class="input-box">
                <label for="password">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
                </label>
                <input type="password" name="password-input" id="password-input" placeholder="Password" required>
            </div>
            <div class="remember-forget">
                <label for="remember">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="">Forgot password?</a>
            </div>
            <button class="btn" type="submit">Login</button>
            <div class="register-link">
                <p>Don't have an account? <a href="{{ url_for('register')}}">Register</a></p>
            </div>
        </form>
    </div>
    
    <div class="side-image left"> <!--this adds a picture to the left side which never moves-->
        <img src="images/left side image.jpg" alt="left image">
    </div>

    <div class="side-image right"> <!--this adds a picture to the right side which never move-->
        <img src="images/right side picture.jpg">
    </div>
</body>
</html>
