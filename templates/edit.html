{% extends "base.html" %}
{% block title %}Edit Expense · Expense Tracker{% endblock %}

{% block content %}
  <h1>Edit Expense</h1>
  <p class="subtitle">Update the fields and save your changes.</p>

  <section class="card form-section">
    <form method="post" action="{{ url_for('edit_expense', expense_id=expense.id) }}" class="form-stack">
      <label>
        <span class="field-label">Description</span>
        <input name="description-input" type="text" value="{{ expense.description }}" />
      </label>

      <div class="form-row-2">
        <label>
          <span class="field-label">Amount</span>
          <input type="number" name="amount-input" step="0.01"
                 value="{{ '%.2f'|format(expense.amount) }}" />
        </label>
        <label>
          <span class="field-label">Date</span>
          <input type="date" name="date-input"
                 value="{{ expense.date.strftime('%Y-%m-%d') if expense.date else today }}" />
        </label>
      </div>

      <label>
        <span class="field-label">Category</span>
        <select name="category-input">
          {% for c in categories %}
            <option value="{{ c.name }}" {% if expense.category.name == c.name %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </label>

      <div class="form-actions">
        <button class="btn btn-brand" type="submit">Save Changes</button>
        <a class="btn btn-neutral" href="{{ url_for('index') }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
